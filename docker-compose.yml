services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartroom_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
      - composer_cache:/tmp/composer-cache
    environment:
      COMPOSER_CACHE_DIR: /tmp/composer-cache
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: quan_ly_nha_tro
      DB_USERNAME: smartroom
      DB_PASSWORD: smartroom
      APP_URL: http://localhost:8000
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: smartroom_mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: quan_ly_nha_tro
      MYSQL_USER: smartroom
      MYSQL_PASSWORD: smartroom
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  composer_cache:
  mysql_data:
